name: Build BubbleTrans Deb

on:
  workflow_dispatch:
  push:
    paths:
      - "tweak/**"
      - ".github/workflows/build-tweak.yml"
      - "JAILBREAK_TWEAK.md"

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install ldid dpkg make
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"

      - name: Build rootless deb
        run: |
          make -C tweak clean package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1
          mkdir -p release
          cp tweak/packages/*.deb release/BubbleTrans-rootless.deb

      - name: Build rootful deb
        run: |
          make -C tweak clean package FINALPACKAGE=1
          cp tweak/packages/*.deb release/BubbleTrans-rootful.deb

      - name: Upload debs
        uses: actions/upload-artifact@v4
        with:
          name: BubbleTrans-debs
          path: |
            release/BubbleTrans-rootless.deb
            release/BubbleTrans-rootful.deb

