name: Build XiBubble IPA

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install ldid
        run: brew install ldid || true

      - name: Build IPA
        run: |
          chmod +x ./build_ipa_macos.sh
          ./build_ipa_macos.sh

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: XiBubble-ipa
          path: dist/XiBubble.ipa
