name: Build BubbleTrans Deb

on:
  workflow_dispatch:
  push:
    paths:
      - "tweak/**"
      - ".github/workflows/build-tweak.yml"
      - "JAILBREAK_TWEAK.md"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install ldid dpkg make
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"

      - name: Build rootless deb
        run: |
          rm -rf release tweak/packages
          make -C tweak clean package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1
          mkdir -p release
          cp tweak/packages/*iphoneos-arm64.deb release/BubbleTrans-rootless.deb

      - name: Build rootful deb
        run: |
          rm -f tweak/packages/*.deb
          make -C tweak clean package FINALPACKAGE=1
          cp tweak/packages/*iphoneos-arm.deb release/BubbleTrans-rootful.deb

      - name: Commit debs to release
        run: |
          VERSION="$(awk '/^Version:/ {print $2}' tweak/control)"
          cp release/BubbleTrans-rootless.deb "release/BubbleTrans-rootless-${VERSION}.deb"
          cp release/BubbleTrans-rootful.deb "release/BubbleTrans-rootful-${VERSION}.deb"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release/BubbleTrans-rootless.deb release/BubbleTrans-rootful.deb "release/BubbleTrans-rootless-${VERSION}.deb" "release/BubbleTrans-rootful-${VERSION}.deb"
          git commit -m "Release BubbleTrans ${VERSION} [skip ci]" || exit 0
          git push

      - name: Upload debs
        uses: actions/upload-artifact@v4
        with:
          name: BubbleTrans-debs
          path: |
            release/BubbleTrans-rootless.deb
            release/BubbleTrans-rootful.deb
            release/BubbleTrans-rootless-*.deb
            release/BubbleTrans-rootful-*.deb
